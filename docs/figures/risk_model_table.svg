<svg xmlns="http://www.w3.org/2000/svg" width="720" height="248" viewBox="0 0 720 248" role="img" aria-label="Risk model thresholds">
  <defs>
    <style>
      .hdr { font: 700 13px 'Segoe UI', system-ui, sans-serif; fill: #00e5ff; }
      .cell { font: 600 13px 'Segoe UI', system-ui, sans-serif; }
      .cell-w { fill: #ffffff; }
      .cell-d { fill: #0b1525; }
    </style>
  </defs>

  <!-- Header  dashboard slate + cyan -->
  <rect x="0" y="0" width="720" height="44" fill="#0b1525"/>
  <text class="hdr" x="16" y="28">Level</text>
  <text class="hdr" x="220" y="28">TTC</text>
  <text class="hdr" x="380" y="28">Distance</text>
  <text class="hdr" x="540" y="28">Lateral |y|</text>

  <!-- CRITICAL #ff1744 -->
  <rect x="0" y="44" width="720" height="51" fill="#ff1744"/>
  <text class="cell cell-w" x="16" y="75">CRITICAL</text>
  <text class="cell cell-w" x="220" y="75">&lt; 1.0 s</text>
  <text class="cell cell-w" x="380" y="75">&lt; 2.0 m</text>
  <text class="cell cell-w" x="540" y="75">&lt; 1.0 m</text>

  <!-- HIGH #ffab00 -->
  <rect x="0" y="95" width="720" height="51" fill="#ffab00"/>
  <text class="cell cell-d" x="16" y="126">HIGH</text>
  <text class="cell cell-d" x="220" y="126">&lt; 2.0 s</text>
  <text class="cell cell-d" x="380" y="126">&lt; 5.0 m</text>
  <text class="cell cell-d" x="540" y="126">&lt; 2.0 m</text>

  <!-- MEDIUM #ffd600 -->
  <rect x="0" y="146" width="720" height="51" fill="#ffd600"/>
  <text class="cell cell-d" x="16" y="177">MEDIUM (moderate)</text>
  <text class="cell cell-d" x="220" y="177">&lt; 3.5 s</text>
  <text class="cell cell-d" x="380" y="177">&lt; 10.0 m</text>
  <text class="cell cell-d" x="540" y="177">&lt; 3.5 m</text>

  <!-- LOW #00e676 -->
  <rect x="0" y="197" width="720" height="51" fill="#00e676"/>
  <text class="cell cell-d" x="16" y="228">LOW</text>
  <text class="cell cell-d" x="220" y="228">otherwise</text>
  <text class="cell cell-d" x="380" y="228">otherwise</text>
  <text class="cell cell-d" x="540" y="228">otherwise</text>
</svg>
